<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>tmux ronin</title>
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header id="bar">
      <span class="brand">⛩ ronin</span>
      <span class="grow"></span>
      <span class="copywrap">
        <button id="selmode" title="Copy mode: drag-select then ⌘C. In a live app like Claude, hold Option while dragging.">Copy Mode</button>
        <button id="copyhelp" title="How to copy" aria-label="How to copy">?</button>
        <div id="copyhelp-pop" role="dialog" aria-label="How to copy">
          <strong>How to copy</strong>
          <p>Click <b>Copy Mode</b>, then drag to select text on the terminal and press <b>⌘C</b>.</p>
          <p>In a <b>Claude</b> terminal (or any live app), hold <b>Option</b> while you drag to select, then <b>⌘C</b>.</p>
        </div>
      </span>
      <button id="copybtn" title="Copy text from the terminal">Copy mode</button>
      <div class="ctrls" role="group" aria-label="Keys">
        <button id="k-esc" title="Esc">Esc</button>
        <button id="k-int" title="Ctrl-C (interrupt)">^C</button>
        <button id="k-bottom" title="Jump to latest output">⤓</button>
        <button id="k-more" title="More keys" aria-expanded="false">⋯</button>
      </div>
      <div class="layouts" role="group" aria-label="Grid layout">
        <button data-layout="1" title="Single terminal">1</button>
        <button data-layout="2" title="Two terminals">2</button>
        <button data-layout="4" class="active" title="Four terminals">4</button>
      </div>
      <button id="refresh" title="Refresh session list">⟳</button>
    </header>
    <div id="keypad" role="group" aria-label="More keys">
      <button data-key="tab" title="Tab">Tab</button>
      <button data-key="stab" title="Shift-Tab">⇧Tab</button>
      <button data-key="up" title="Up">↑</button>
      <button data-key="down" title="Down">↓</button>
      <button data-key="left" title="Left">←</button>
      <button data-key="right" title="Right">→</button>
    </div>
    <main id="grid" class="layout-4" data-layout="4"></main>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
